<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boas-vindas | Estuda+</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #1e1e2f 0%, #2a2a40 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1.5rem;
        }

        .welcome-container {
            text-align: center;
            max-width: 550px;
            width: 100%;
            animation: fadeInUp 0.9s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            font-size: 4.5rem;
            margin-bottom: 1.2rem;
            display: inline-block;
            background: rgba(255, 255, 255, 0.06);
            width: 110px;
            height: 110px;
            line-height: 110px;
            border-radius: 50%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #ffffff 0%, #d0d0ff 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #b0b0cc;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-continuar {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: #5b5fef;
            color: #fff;
            border: none;
            padding: 1rem 2.8rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(91, 95, 239, 0.4);
            letter-spacing: 0.3px;
        }

        .btn-continuar:hover {
            background: #7074f7;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(91, 95, 239, 0.55);
        }

        .btn-continuar:active {
            transform: translateY(0);
            box-shadow: 0 8px 20px rgba(91, 95, 239, 0.45);
        }

        .btn-continuar .seta {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .btn-continuar:hover .seta {
            transform: translateX(5px);
        }

        /* Responsivo */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .btn-continuar {
                padding: 0.85rem 2rem;
                font-size: 1rem;
            }
            .logo-icon {
                font-size: 3.5rem;
                width: 90px;
                height: 90px;
                line-height: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <!-- Ícone ou logo simples -->
        <div class="logo-icon">📚</div>

        <!-- Mensagem de boas-vindas -->
        <h1>Bem-vindo(a) aos Estudos!</h1>
        <p class="subtitle">
            Sua jornada de aprendizado começa aqui.<br>
            Prepare-se para alcançar seus objetivos.
        </p>

        <!-- Botão principal para continuar -->
        <a href="#" class="btn-continuar" id="btnEstudos">
            Continuar para os estudos
            <span class="seta">→</span>
        </a>
    </div>

    <!-- Pequeno script para exemplificar ação (pode ser alterado conforme necessidade) -->
    <script>
        document.getElementById('btnEstudos').addEventListener('click', function(e) {
            e.preventDefault();
            // Aqui você pode redirecionar para a página principal de estudos
            // Exemplo: window.location.href = 'pagina-estudos.html';
            // Por enquanto, apenas exibe uma mensagem de exemplo
            alert('🎓 Redirecionando para a área de estudos...\n(Implemente o link real aqui)');
        });
    </script>
</body>
</html>
