<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos+ | Sua jornada ENEM começa aqui</title>
    <style>
        :root {
            --bg-dark: #0a0c14;
            --primary: #6c63ff;
            --gold: #f9a826;
            --light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: default;
        }

        /* Canvas para as partículas de rede neural */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Card principal com vidro */
        .welcome-card {
            position: relative;
            z-index: 10;
            background: rgba(20, 20, 40, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 40px;
            padding: 3.5rem 2.5rem;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(108, 99, 255, 0.1);
            animation: cardEntry 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .welcome-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(108, 99, 255, 0.2);
        }

        @keyframes cardEntry {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ícone animado */
        .icon-wrapper {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #a78bfa, #f9a826, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            font-size: 1.4rem;
            font-weight: 300;
            color: #cbd5e1;
            margin-bottom: 1rem;
            min-height: 2.5rem;
        }

        .typed-cursor {
            color: #f9a826;
            font-weight: 300;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Contador regressivo */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 0.8rem 1.2rem;
            min-width: 70px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .countdown-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: #f9a826;
            line-height: 1;
        }

        .countdown-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-top: 0.3rem;
        }

        /* Botão com efeito de brilho e ripple */
        .btn-comecar {
            position: relative;
            display: inline-block;
            padding: 1.2rem 3.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #0f0c29;
            background: linear-gradient(135deg, #f9a826, #ff6b6b);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(249, 168, 38, 0.4);
            transition: all 0.4s ease;
            overflow: hidden;
            z-index: 1;
            margin-top: 1rem;
        }

        .btn-comecar:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(249, 168, 38, 0.6);
            background: linear-gradient(135deg, #ff6b6b, #f9a826);
        }

        .btn-comecar:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px rgba(249, 168, 38, 0.5);
        }

        /* Ondulação (ripple) interna no hover */
        .btn-comecar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-comecar:hover::before {
            width: 300px;
            height: 300px;
        }

        /* Efeito de partículas no clique */
        .click-particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: #f9a826;
            box-shadow: 0 0 20px #f9a826;
            z-index: 999;
            animation: particleBurst 0.8s ease-out forwards;
        }

        @keyframes particleBurst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Mensagem motivacional extra */
        .extra-message {
            margin-top: 1.2rem;
            font-size: 0.9rem;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        /* Responsividade */
        @media (max-width: 550px) {
            h1 {
                font-size: 2.8rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
            .countdown-number {
                font-size: 1.8rem;
            }
            .btn-comecar {
                padding: 1rem 2.5rem;
                font-size: 1.3rem;
            }
            .welcome-card {
                padding: 2.5rem 1.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="welcome-card">
        <div class="icon-wrapper">🧠✨</div>
        <h1>Estudos+</h1>
        <div class="subtitle">
            <span id="typed-text"></span><span class="typed-cursor">|</span>
        </div>

        <!-- Contagem regressiva até o ENEM 2026 (3 de novembro de 2026) -->
        <div class="countdown-container" id="countdown">
            <div class="countdown-item">
                <div class="countdown-number" id="days">00</div>
                <div class="countdown-label">Dias</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="hours">00</div>
                <div class="countdown-label">Horas</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="minutes">00</div>
                <div class="countdown-label">Min</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="seconds">00</div>
                <div class="countdown-label">Seg</div>
            </div>
        </div>

        <a href="10.html" class="btn-comecar" id="startButton">Começar agora 🚀</a>
        <p class="extra-message">Prepare-se com os melhores conteúdos focados no ENEM</p>
    </div>

    <script>
        (function() {
            // ---------- CANVAS DE PARTÍCULAS INTERATIVAS (REDE NEURAL) ----------
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const particleCount = 70;
            const maxDistance = 120;
            const mouse = { x: -1000, y: -1000, radius: 150 };

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.6;
                    this.vy = (Math.random() - 0.5) * 0.6;
                    this.radius = Math.random() * 2.5 + 1.2;
                    this.originalColor = `rgba(108, 99, 255, 0.9)`;
                }
                update() {
                    // Atração/repulsão suave do mouse
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        const angle = Math.atan2(dy, dx);
                        const force = (mouse.radius - dist) / mouse.radius;
                        this.x += Math.cos(angle) * force * 2.5;
                        this.y += Math.sin(angle) * force * 2.5;
                    }

                    this.x += this.vx;
                    this.y += this.vy;

                    // Reposicionar nas bordas
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.originalColor;
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }
            initParticles();

            function connectParticles() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < maxDistance) {
                            const opacity = 1 - dist / maxDistance;
                            ctx.strokeStyle = `rgba(169, 148, 255, ${opacity * 0.5})`;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                connectParticles();
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // Mouse move: atualiza posição do mouse para interação
            document.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            document.addEventListener('mouseleave', () => {
                mouse.x = -1000;
                mouse.y = -1000;
            });

            // ---------- EFEITO DE DIGITAÇÃO ----------
            const typedTextElement = document.getElementById('typed-text');
            const phrases = [
                'Sua jornada rumo à aprovação começa agora.',
                'Domine os conteúdos do ENEM com inteligência.',
                'Estude no seu ritmo, alcance seus objetivos.',
                'Do sonho à universidade: você é capaz!'
            ];
            let phraseIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            let typingSpeed = 80;

            function typeEffect() {
                const currentPhrase = phrases[phraseIndex];
                if (!isDeleting) {
                    typedTextElement.textContent = currentPhrase.substring(0, charIndex + 1);
                    charIndex++;
                    if (charIndex === currentPhrase.length) {
                        isDeleting = true;
                        setTimeout(typeEffect, 2000);
                        return;
                    }
                } else {
                    typedTextElement.textContent = currentPhrase.substring(0, charIndex - 1);
                    charIndex--;
                    if (charIndex === 0) {
                        isDeleting = false;
                        phraseIndex = (phraseIndex + 1) % phrases.length;
                    }
                }
                const speed = isDeleting ? 40 : 80;
                setTimeout(typeEffect, speed);
            }
            typeEffect();

            // ---------- CONTAGEM REGRESSIVA ENEM ----------
            // Data alvo: 3 de novembro de 2026 (primeiro domingo de novembro é comum)
            const targetDate = new Date('2026-11-03T09:00:00-03:00').getTime();

            function updateCountdown() {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    document.getElementById('days').textContent = '00';
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = days.toString().padStart(2, '0');
                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // ---------- EFEITO DE PARTÍCULAS NO CLIQUE DO BOTÃO ----------
            const startBtn = document.getElementById('startButton');
            startBtn.addEventListener('click', function(e) {
                e.preventDefault(); // Evita navegação imediata
                const btnRect = startBtn.getBoundingClientRect();
                const centerX = btnRect.left + btnRect.width / 2;
                const centerY = btnRect.top + btnRect.height / 2;

                // Cria várias partículas saindo do botão
                for (let i = 0; i < 25; i++) {
                    createClickParticle(centerX, centerY);
                }

                // Pequena pausa para o efeito visual, depois redireciona
                setTimeout(() => {
                    window.location.href = '10.html';
                }, 400);
            });

            function createClickParticle(x, y) {
                const particle = document.createElement('div');
                particle.classList.add('click-particle');
                const size = Math.random() * 10 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                // Direção aleatória
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 120 + 40;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);

                document.body.appendChild(particle);

                // Remove após animação
                setTimeout(() => {
                    particle.remove();
                }, 800);
            }

            // Reinicializa partículas ao redimensionar (opcional, mas mantém consistência)
            window.addEventListener('resize', () => {
                initParticles();
            });

        })();
    </script>
</body>
</html>
