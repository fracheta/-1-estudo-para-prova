<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos+ | Bem-vindo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0f1c, #1a1f3a, #2d1f4e);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Animação suave do fundo */
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Partículas decorativas */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-20px) scale(1.2);
                opacity: 0.6;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 2;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff9a76, #feb47b, #ffe259);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #d1d5db;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .highlight {
            color: #ffe259;
            font-weight: 600;
        }

        .btn-start {
            display: inline-block;
            padding: 18px 50px;
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
            color: #1a1f3a;
            background: linear-gradient(135deg, #ffe259, #ff9a76);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 154, 118, 0.5);
            letter-spacing: 1px;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 154, 118, 0.7);
            background: linear-gradient(135deg, #ff9a76, #feb47b);
            color: #0c0f1c;
        }

        .btn-start:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px rgba(255, 154, 118, 0.5);
        }

        .btn-start::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(25deg);
            transition: left 0.5s ease;
        }

        .btn-start:hover::after {
            left: 120%;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #b0b7c3;
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .feature-item span {
            font-size: 1.2rem;
        }

        /* Responsividade */
        @media (max-width: 500px) {
            h1 {
                font-size: 2.2rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .btn-start {
                padding: 15px 35px;
                font-size: 1.2rem;
            }
            .container {
                padding: 35px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas decorativas de fundo -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="logo-icon">📚✨</div>
        <h1>Estudos+</h1>
        <p class="subtitle">
            Sua jornada para o <span class="highlight">ENEM</span> começa aqui!<br>
            Prepare-se com inteligência e alcance a aprovação dos seus sonhos.
        </p>

        <!-- Botão que leva para 10.html -->
        <a href="10.html" class="btn-start">Começar agora 🚀</a>

        <div class="features">
            <div class="feature-item">
                <span>📖</span> Conteúdo focado
            </div>
            <div class="feature-item">
                <span>🎯</span> Simulados ENEM
            </div>
            <div class="feature-item">
                <span>📊</span> Acompanhamento
            </div>
        </div>
    </div>

    <script>
        // Cria partículas decorativas no fundo
        const particlesContainer = document.getElementById('particles');
        const numParticles = 30;

        for (let i = 0; i < numParticles; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 8 + 3;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            particle.style.animationDelay = `${Math.random() * 8}s`;
            particle.style.animationDuration = `${Math.random() * 8 + 5}s`;
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
